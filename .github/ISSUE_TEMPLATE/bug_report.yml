name: Bug report
description: Report something that is broken or confusing in F95 Updater.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it.
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Example: v1.1.8 / versionCode 193
      placeholder: v1.1.8
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Android device and version
      placeholder: Pixel 8, Android 15
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installed apps / main screen
        - Catalog search or matching
        - APK install
        - JoiPlay import/install/upgrade
        - Backup/export/import
        - Self-update
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you tap or select before the problem happened?
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Select ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include exact error text if there was any.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics, logs, or screenshots
      description: Attach diagnostics/logs/screenshots if available. Remove anything private before uploading.
      render: text
